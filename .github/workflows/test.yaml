name: Test

on:
  push:
  pull_request:

jobs:
  # ── Run the Go test suite ──────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # Install the Go version declared in go.mod.
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - run: go test ./...