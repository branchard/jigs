# yaml-language-server: $schema=https://raw.githubusercontent.com/SchemaStore/schemastore/refs/heads/master/src/schemas/json/github-workflow.json
name: Release

# Run when a tag is pushed to the repository
on:
  push:
    tags: [ "v*" ]

# Read repo contents for checkout; write packages to push to GHCR.
permissions:
  contents: write
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  # ── Build cross-platform binaries and create a GitHub Release ──────
  github-release:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: windows
            goarch: arm64
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          ext=""
          if [ "$GOOS" = "windows" ]; then ext=".exe"; fi
          mkdir -p dist
          go build -o "dist/jigs-${GOOS}-${GOARCH}${ext}" ./cmd/jigs

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: jigs-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*

  # ── Build the Docker image and publish it to GHCR ──────────────────
  container-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # QEMU enables emulation, so Buildx can cross-build for ARM64
      # on the amd64 runner.
      - uses: docker/setup-qemu-action@v4

      # Buildx gives us layer caching and multi-platform support.
      - uses: docker/setup-buildx-action@v4

      # Authenticate to GitHub Container Registry using the built-in
      # GITHUB_TOKEN — no extra secrets required.
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Derive image tags from the Git ref:
      # tag v1.2.3 → 1.2.3, 1.2 and 1
      # → sha-<short>
      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{major}}.{{minor}}.{{patch}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha

      # Build the image for both amd64 and arm64, then push.
      # On pull requests the image is built (to validate the Dockerfile)
      # but not pushed.
      - uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
