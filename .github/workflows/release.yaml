# yaml-language-server: $schema=https://raw.githubusercontent.com/SchemaStore/schemastore/refs/heads/master/src/schemas/json/github-workflow.json
name: Release

# Run when a tag is pushed to the repository
on:
  push:
    tags: [ "v*" ]

# Read repo contents for checkout; write packages to push to GHCR.
permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  # ── Build the Docker image and publish it to GHCR ──────────────────
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # QEMU enables emulation, so Buildx can cross-build for ARM64
      # on the amd64 runner.
      - uses: docker/setup-qemu-action@v4

      # Buildx gives us layer caching and multi-platform support.
      - uses: docker/setup-buildx-action@v4

      # Authenticate to GitHub Container Registry using the built-in
      # GITHUB_TOKEN — no extra secrets required.
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Derive image tags from the Git ref:
      # tag v1.2.3 → 1.2.3, 1.2 and 1
      # → sha-<short>
      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{major}}.{{minor}}.{{patch}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha

      # Build the image for both amd64 and arm64, then push.
      # On pull requests the image is built (to validate the Dockerfile)
      # but not pushed.
      - uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
