name: CI

# Run on pushes to main, version tags (v1.0.0, etc.), and pull requests.
on:
  push:
    branches: [ main ]
    tags: [ "v*" ]
  pull_request:
    branches: [ main ]

# Read repo contents for checkout; write packages to push to GHCR.
permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  # ── Run the Go test suite ──────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Install the Go version declared in go.mod.
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - run: go test ./...

  # ── Build the Docker image and publish it to GHCR ──────────────────
  build-and-publish:
    needs: test # only run after the tests pass
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # QEMU enables emulation so Buildx can cross-build for ARM64
      # on the amd64 runner.
      - uses: docker/setup-qemu-action@v3

      # Buildx gives us layer caching and multi-platform support.
      - uses: docker/setup-buildx-action@v3

      # Authenticate to GitHub Container Registry using the built-in
      # GITHUB_TOKEN — no extra secrets required.
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Derive image tags from the Git ref:
      #   push to main          → :main
      #   pull request #42      → :pr-42
      #   tag v1.2.3            → :1.2.3 and :1.2
      #   every build           → :sha-<short>
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      # Build the image for both amd64 and arm64, then push.
      # On pull requests the image is built (to validate the Dockerfile)
      # but not pushed.
      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
